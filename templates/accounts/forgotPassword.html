{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<section class="section-content padding-y" style="min-height: 84vh;">
    <div class="card mx-auto" style="max-width: 420px; margin-top:100px;">
        <div class="card-body">
            <h4 class="card-title mb-4">{% trans "Reset Password" %}</h4>
            <form method="POST">
                {% csrf_token %}
                {{ form.email.errors }}
                <div class="form-group">
                    {{ form.email }}
                </div>
                <div class="form-group">
                    <a href="{% url 'login' %}" class="float-right">{% trans "Got password? Login" %}</a>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-block">{% trans "Submit" %}</button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
